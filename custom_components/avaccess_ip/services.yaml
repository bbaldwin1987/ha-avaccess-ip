switch_group:
  name: Switch group to source
  description: Switch multiple decoders to a single encoder source at once.
  fields:
    target:
      name: Decoders
      description: The decoder media_player entities to switch.
      required: true
      selector:
        entity:
          integration: avaccess_ip
          domain: media_player
          multiple: true
    source:
      name: Source
      description: The encoder to route to all selected decoders (friendly name or MAC).
      required: true
      example: Apple TV
      selector:
        text:

clear_source:
  name: Clear decoder source
  description: Unbind one or more decoder media_player entities from their current source.
  fields:
    target:
      name: Decoders
      description: The decoder media_player entities to clear.
      required: true
      selector:
        entity:
          integration: avaccess_ip
          domain: media_player
          multiple: true

send_cec:
  name: Send CEC command
  description: Send a raw CEC command string through one or more AV Access devices.
  fields:
    target:
      name: Devices
      description: AV Access entities whose devices should send the CEC command.
      required: true
      selector:
        entity:
          integration: avaccess_ip
          multiple: true
    cec_string:
      name: CEC command
      description: Raw CEC command string passed to cec -s.
      required: true
      example: "40 04"
      selector:
        text:

reboot_device:
  name: Reboot device
  description: Reboot one or more AV Access devices.
  fields:
    target:
      name: Devices
      description: AV Access entities whose devices should reboot.
      required: true
      selector:
        entity:
          integration: avaccess_ip
          multiple: true

samsung_frame_art_mode:
  name: Samsung Frame Art Mode
  description: Turn Samsung Frame Art Mode on or off through a decoder's RS232 Ex-Link connection.
  fields:
    target:
      name: Decoders
      description: Decoder media_player or display power entities connected to Samsung Frame TVs.
      required: true
      selector:
        entity:
          integration: avaccess_ip
          multiple: true
    enabled:
      name: Art Mode enabled
      description: Turn Art Mode on when enabled, or off when disabled.
      required: true
      selector:
        boolean:
